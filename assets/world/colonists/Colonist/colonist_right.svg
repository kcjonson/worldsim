<?xml version="1.0" encoding="UTF-8"?>
<!-- Colonist facing RIGHT - leading (right) arm reaches forward, one eye + nose on the
     facing side. Highlights stay upper-left (light doesn't mirror with facing).
     Cutout-animation ready: every movable body part is its own <g id="..."> with its
     OWN dark rim plus colored fills. Each part's first <path> starts its `d` at the
     part's pivot joint (M = node 0). The trailing left arm is mostly behind the body,
     so arm_left is a smaller group. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 100" width="60" height="100">

  <!-- ===== leg_left (pivot: hip, top of leg) ===== -->
  <g id="leg_left">
    <path d="M24,63 C27,63 31,66 31,70 L31,86 C31,90 28,93 24,93 C20,93 17,90 17,86 L17,70 C17,66 21,63 24,63 Z" fill="#1e1712"/>
    <path d="M24,65 C27,65 30,66 30,68 L30,85 L18,85 L18,68 C18,66 21,65 24,65 Z" fill="#403a45"/>
    <path d="M24,66 L24,80 L19,80 L19,69 C20,67 22,66 24,66 Z" fill="#4d4653"/>
    <path d="M18,83 L30,83 L30,88 C30,91 27,92 24,92 C21,92 18,91 18,88 Z" fill="#2a2018"/>
  </g>

  <!-- ===== leg_right (pivot: hip, top of leg) ===== -->
  <g id="leg_right">
    <path d="M36,63 C39,63 43,66 43,70 L43,86 C43,90 40,93 36,93 C32,93 29,90 29,86 L29,70 C29,66 33,63 36,63 Z" fill="#1e1712"/>
    <path d="M36,65 C39,65 42,66 42,68 L42,85 L30,85 L30,68 C30,66 33,65 36,65 Z" fill="#403a45"/>
    <path d="M36,66 L36,80 L31,80 L31,69 C32,67 34,66 36,66 Z" fill="#4d4653"/>
    <path d="M30,83 L42,83 L42,88 C42,91 39,92 36,92 C33,92 30,91 30,88 Z" fill="#2a2018"/>
  </g>

  <!-- ===== arm_left (trailing arm, mostly behind body; pivot: shoulder) ===== -->
  <g id="arm_left">
    <path d="M16,36 C20,36 21,40 20,46 L19,59 C19,64 11,64 10,59 L9,44 C9,39 12,36 16,36 Z" fill="#1e1712"/>
    <path d="M16,38 C19,38 19.5,41 19,46 L18,57 C18,61 12,61 11,57 L11,44 C11,40 13,38 16,38 Z" fill="#3f5872"/>
    <path d="M18,55 C15,54 11,55 11,58 C11,61 18,61 18,58 Z" fill="#c08d6c"/>
  </g>

  <!-- ===== torso (pivot: torso base-center) ===== -->
  <g id="torso">
    <path d="M30,73 C24,73 19,71 17,69 C11.5,50 12,41 13,33 C21,29 39,29 47,33 C48,41 48.5,50 41,69 C39,71 36,73 30,73 Z" fill="#1e1712"/>
    <path d="M30,71 C24,71 21,71 21,67.5 C14,50 14,42 14,42 C15,34.5 22,31 30,31 C38,31 45,34.5 46,42 C46,50 41,64 39,67.5 C36,71 36,71 30,71 Z" fill="#48627f"/>
    <path d="M22,35 C26,33 30,33 32,35 C29,38 26,47 25,56 C21,49 18,40 22,35 Z" fill="#5e7896"/>
  </g>

  <!-- ===== arm_right (leading arm, reaching right - shadow side; pivot: shoulder) ===== -->
  <g id="arm_right">
    <path d="M42,37 C41,37 40,38 40,41 C42,46 45,52 50,53 C54,54 57.5,51 56,47 C54,42 48,37 42,37 Z" fill="#1e1712"/>
    <path d="M43,39 C42,39 42,39.5 42,41 C43.5,45 45.5,50 49.5,51 C52.5,52 54.5,50 53.5,47 C52,43 48,39 43,39 Z" fill="#48627f"/>
    <path d="M44,40 C43.5,41 44,44 48,48.5 C50,49 51.5,48 51,46 C50,43 47,41 44,40 Z" fill="#3f5872"/>
    <path d="M54.5,46 C52.5,45 50.5,47 51,50 C51.5,53 56,52 56,49 C56,47 55.5,46 54.5,46 Z" fill="#cf9876"/>
  </g>

  <!-- ===== head (facing right; pivot: neck base, bottom-center) ===== -->
  <g id="head">
    <path d="M30,34 C21.5,34 14.5,27 14.5,18.5 C14.5,10 21.5,3 30,3 C38.5,3 45.5,10 45.5,18.5 C45.5,27 38.5,34 30,34 Z" fill="#1e1712"/>
    <path d="M30,32 C22.5,32 16.5,26 16.5,18.5 C16.5,11 22.5,5 30,5 C37.5,5 43.5,11 43.5,18.5 C43.5,26 37.5,32 30,32 Z" fill="#d8a07c"/>
    <path d="M44.5,21 C46.5,22 46.5,25 44,26 C43,24.5 43,22 44.5,21 Z" fill="#cf9876"/>
    <path d="M43.5,21 C45,10 38,4 30,4 C22,4 15,10 16,21 C16.5,15 22,12.5 27,13 C26,18 27,25 29,29 C34,29 42,27 43.5,21 Z" fill="#5c4029"/>
    <path d="M20,17 C20,10 25,6 31,6 C28,6 24,9 22,14 C21,16 20,17 20,17 Z" fill="#7d5c38"/>
    <path d="M38,19 C36.5,18.5 35,19.5 35,21 C35,22.5 37,22.5 38,21.5 C39,20.5 39,19.5 38,19 Z" fill="#241a12"/>
  </g>
</svg>
