    <path d="M24,19 C25.5,18.5 27,19.5 27,21 C27,22.5 25,22.5 24,21.5 C23,20.5 23,19.5 24,19 Z" fill="#241a12"/>
    <path d="M36,19 C34.5,18.5 33,19.5 33,21 C33,22.5 35,22.5 36,21.5 C37,20.5 37,19.5 36,19 Z" fill="#241a12"/>
