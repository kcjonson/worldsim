<?xml version="1.0" encoding="UTF-8"?>
<!-- Colonist facing LEFT - leading (left) arm reaches forward, one eye + nose on the
     facing side. Body reuses the DOWN construction. Cutout-animation ready: every
     movable body part is its own <g id="..."> with its OWN dark rim plus colored fills.
     Each part's first <path> starts its `d` at the part's pivot joint (M = node 0).
     The trailing right arm is mostly behind the body, so arm_right is a smaller group. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 100" width="60" height="100">

  <!-- ===== leg_left (pivot: hip, top of leg) ===== -->
  <g id="leg_left">
    <path d="M24,63 C27,63 31,66 31,70 L31,86 C31,90 28,93 24,93 C20,93 17,90 17,86 L17,70 C17,66 21,63 24,63 Z" fill="#1e1712"/>
    <path d="M24,65 C27,65 30,66 30,68 L30,85 L18,85 L18,68 C18,66 21,65 24,65 Z" fill="#403a45"/>
    <path d="M24,66 L24,80 L19,80 L19,69 C20,67 22,66 24,66 Z" fill="#4d4653"/>
    <path d="M18,83 L30,83 L30,88 C30,91 27,92 24,92 C21,92 18,91 18,88 Z" fill="#2a2018"/>
  </g>

  <!-- ===== leg_right (pivot: hip, top of leg) ===== -->
  <g id="leg_right">
    <path d="M36,63 C39,63 43,66 43,70 L43,86 C43,90 40,93 36,93 C32,93 29,90 29,86 L29,70 C29,66 33,63 36,63 Z" fill="#1e1712"/>
    <path d="M36,65 C39,65 42,66 42,68 L42,85 L30,85 L30,68 C30,66 33,65 36,65 Z" fill="#403a45"/>
    <path d="M36,66 L36,80 L31,80 L31,69 C32,67 34,66 36,66 Z" fill="#4d4653"/>
    <path d="M30,83 L42,83 L42,88 C42,91 39,92 36,92 C33,92 30,91 30,88 Z" fill="#2a2018"/>
  </g>

  <!-- ===== arm_right (trailing arm, mostly behind body; pivot: shoulder) ===== -->
  <g id="arm_right">
    <path d="M44,36 C40,36 39,40 40,46 L41,59 C41,64 49,64 50,59 L51,44 C51,39 48,36 44,36 Z" fill="#1e1712"/>
    <path d="M44,38 C41,38 40.5,41 41,46 L42,57 C42,61 48,61 49,57 L49,44 C49,40 47,38 44,38 Z" fill="#3f5872"/>
    <path d="M42,55 C45,54 49,55 49,58 C49,61 42,61 42,58 Z" fill="#c08d6c"/>
  </g>

  <!-- ===== torso (pivot: torso base-center) ===== -->
  <g id="torso">
    <path d="M30,73 C24,73 19,71 17,69 C11.5,50 12,41 13,33 C21,29 39,29 47,33 C48,41 48.5,50 41,69 C39,71 36,73 30,73 Z" fill="#1e1712"/>
    <path d="M30,71 C24,71 21,71 21,67.5 C14,50 14,42 14,42 C15,34.5 22,31 30,31 C38,31 45,34.5 46,42 C46,50 41,64 39,67.5 C36,71 36,71 30,71 Z" fill="#48627f"/>
    <path d="M22,35 C26,33 30,33 32,35 C29,38 26,47 25,56 C21,49 18,40 22,35 Z" fill="#5e7896"/>
  </g>

  <!-- ===== arm_left (leading arm, reaching left; pivot: shoulder) ===== -->
  <g id="arm_left">
    <path d="M18,37 C19,37 20,38 20,41 C18,46 15,52 10,53 C6,54 2.5,51 4,47 C6,42 12,37 18,37 Z" fill="#1e1712"/>
    <path d="M17,39 C18,39 18,39.5 18,41 C16.5,45 14.5,50 10.5,51 C7.5,52 5.5,50 6.5,47 C8,43 12,39 17,39 Z" fill="#52708e"/>
    <path d="M16,40 C16.5,41 16,44 12,48.5 C10,49 8.5,48 9,46 C10,43 13,41 16,40 Z" fill="#6580a0"/>
    <path d="M5.5,46 C7.5,45 9.5,47 9,50 C8.5,53 4,52 4,49 C4,47 4.5,46 5.5,46 Z" fill="#d8a07c"/>
  </g>

  <!-- ===== head (facing left; pivot: neck base, bottom-center) ===== -->
  <g id="head">
    <path d="M30,34 C21.5,34 14.5,27 14.5,18.5 C14.5,10 21.5,3 30,3 C38.5,3 45.5,10 45.5,18.5 C45.5,27 38.5,34 30,34 Z" fill="#1e1712"/>
    <path d="M30,32 C22.5,32 16.5,26 16.5,18.5 C16.5,11 22.5,5 30,5 C37.5,5 43.5,11 43.5,18.5 C43.5,26 37.5,32 30,32 Z" fill="#d8a07c"/>
    <path d="M15.5,21 C13.5,22 13.5,25 16,26 C17,24.5 17,22 15.5,21 Z" fill="#cf9876"/>
    <path d="M16.5,21 C15,10 22,4 30,4 C38,4 45,10 44,21 C43.5,15 38,12.5 33,13 C34,18 33,25 31,29 C26,29 18,27 16.5,21 Z" fill="#5c4029"/>
    <path d="M20,17 C20,10 25,6 31,6 C34,6 36,7 38,9 C32,8 24,11 22,18 C21,18 20,17 20,17 Z" fill="#7d5c38"/>
    <path d="M22,19 C23.5,18.5 25,19.5 25,21 C25,22.5 23,22.5 22,21.5 C21,20.5 21,19.5 22,19 Z" fill="#241a12"/>
  </g>
</svg>
