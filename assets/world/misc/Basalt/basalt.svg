<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Basalt - Top-down view (~0.45m blocky volcanic rock) -->
  <!-- Dark angular near-black basalt; strong silhouette against tropical ground -->

  <!-- Cast shadow -->
  <ellipse cx="55" cy="66" rx="32" ry="18" fill="#22252a" opacity="0.35"/>

  <!-- Main angular block (near-black dark grey, left-rear face) -->
  <path d="M22,38
           L38,22
           L72,24
           L82,40
           L78,64
           L60,76
           L26,72
           L18,54 Z"
        fill="#3c4046"/>

  <!-- Top facet (slightly lighter, flat volcanic surface) -->
  <path d="M30,34
           L44,24
           L68,26
           L74,38
           L70,54
           L54,62
           L32,58
           L24,44 Z"
        fill="#484e56"/>

  <!-- Right angular facet (catches slight light, still very dark) -->
  <path d="M70,54
           L78,40
           L82,46
           L80,64
           L70,70
           L60,76
           L62,66 Z"
        fill="#404850"/>

  <!-- Rusty-red weathering specks (faint iron oxide staining) -->
  <ellipse cx="44" cy="38" rx="5" ry="3" fill="#7a4a3a" opacity="0.4"/>
  <ellipse cx="62" cy="46" rx="4" ry="2" fill="#8a4a32" opacity="0.35"/>
  <ellipse cx="36" cy="52" rx="3" ry="2" fill="#7a4232" opacity="0.3"/>

  <!-- Sharp angular joint line (basalt cracks in polygonal columns) -->
  <path d="M50,26 L52,62" stroke="#2a2e34" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M30,42 L70,44" stroke="#2a2e34" stroke-width="1.0" fill="none" opacity="0.6"/>

  <!-- A small detached chip at front-left -->
  <path d="M24,66
           L30,62
           L36,66
           L32,72
           L24,72 Z"
        fill="#3c4046"/>
</svg>
