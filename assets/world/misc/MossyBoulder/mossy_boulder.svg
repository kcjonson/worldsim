<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Mossy Boulder - Top-down view (~0.4m rounded boulder) -->

  <!-- Cast shadow -->
  <ellipse cx="54" cy="67" rx="32" ry="18" fill="#3a4a2a" opacity="0.30"/>

  <!-- Boulder base (rounded grey) -->
  <path d="M26,38
           C34,24 60,22 72,34
           C84,46 82,64 68,72
           C54,80 30,78 20,62
           C14,52 16,44 26,38 Z"
        fill="#74756f"/>

  <!-- Lighter mid-tone (top surface) -->
  <path d="M32,36
           C44,26 62,27 70,38
           C78,50 74,62 62,68
           C50,74 34,70 28,58
           C22,48 24,44 32,36 Z"
        fill="#8e908a"/>

  <!-- Moss patch 1 - large spreading mass over upper-left -->
  <path d="M30,34
           C40,28 54,30 56,42
           C58,52 46,58 36,54
           C26,50 24,42 30,34 Z"
        fill="#5d7a45"/>

  <!-- Moss patch 2 - smaller patch right side -->
  <path d="M60,40
           C68,38 76,46 74,56
           C72,64 62,66 56,60
           C52,55 54,45 60,40 Z"
        fill="#4e6b39"/>

  <!-- Moss patch 3 - lower fringe -->
  <path d="M38,60
           C48,56 60,58 62,66
           C64,72 56,78 44,76
           C34,74 32,66 38,60 Z"
        fill="#5d7a45"/>

  <!-- Moss highlight (damp sheen on main patch) -->
  <ellipse cx="42" cy="42" rx="9" ry="7" fill="#729552" opacity="0.7"/>

  <!-- Bare rock highlight (where moss hasn't taken hold) -->
  <ellipse cx="60" cy="32" rx="7" ry="5" fill="#a8aaa3" opacity="0.65"/>

  <!-- Damp crack line -->
  <path d="M50,38 Q56,50 52,62" stroke="#3e5530" stroke-width="1.2" fill="none" opacity="0.6"/>
</svg>
