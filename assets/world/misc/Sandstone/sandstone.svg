<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Sandstone - Top-down view (~0.4m weathered desert rock cluster) -->

  <!-- Cast shadow -->
  <ellipse cx="54" cy="68" rx="34" ry="20" fill="#7a5a3a" opacity="0.35"/>

  <!-- Larger rear block (warm tan, flat-topped weathered sandstone) -->
  <path d="M28,30
           C40,24 60,24 70,32
           C80,40 80,56 70,64
           C58,72 38,72 28,64
           C18,56 18,38 28,30 Z"
        fill="#c2a06a"/>

  <!-- Sunlit top face -->
  <path d="M34,32
           C46,27 60,28 66,36
           C71,43 69,52 60,56
           C50,60 38,58 32,50
           C27,44 28,37 34,32 Z"
        fill="#d4b681"/>

  <!-- Front lower block (slightly darker, overlaps the larger one) -->
  <path d="M40,58
           C50,54 64,55 70,62
           C75,68 73,78 64,82
           C54,86 42,84 37,77
           C33,71 33,62 40,58 Z"
        fill="#b89254"/>

  <!-- Highlight on front block -->
  <ellipse cx="52" cy="68" rx="12" ry="8" fill="#cda968" opacity="0.8"/>

  <!-- A couple of small chips at the base -->
  <ellipse cx="24" cy="60" rx="6" ry="4" fill="#b89254"/>
  <ellipse cx="78" cy="50" rx="5" ry="4" fill="#b89254"/>

  <!-- Sedimentary banding (thin lines, the sandstone tell) -->
  <path d="M30,44 Q50,40 68,46" stroke="#a6824a" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M44,70 Q56,67 68,72" stroke="#9c7840" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
