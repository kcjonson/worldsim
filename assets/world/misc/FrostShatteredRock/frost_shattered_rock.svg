<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- FrostShatteredRock - Top-down view (~0.3m felsenmeer angular shard cluster) -->

  <!-- Shadow beneath cluster -->
  <ellipse cx="52" cy="62" rx="36" ry="18" fill="#8a9aaa" opacity="0.28"/>

  <!-- Rear-left shard (large, cold blue-grey) -->
  <path d="M18,52
           L26,28
           L42,24
           L48,38
           L38,58
           L22,60 Z"
        fill="#6c7480"/>

  <!-- Rear-right shard (slightly lighter) -->
  <path d="M44,26
           L60,20
           L74,30
           L70,46
           L54,50
           L42,40 Z"
        fill="#7a8490"/>

  <!-- Front-center shard (darkest, overlapping) -->
  <path d="M36,50
           L52,44
           L66,52
           L62,72
           L46,78
           L30,68 Z"
        fill="#5e6870"/>

  <!-- Small chip top-right -->
  <path d="M68,32
           L78,26
           L84,36
           L76,44
           L66,40 Z"
        fill="#6c7480"/>

  <!-- Small chip bottom-right -->
  <path d="M66,60
           L78,58
           L80,70
           L70,76
           L62,68 Z"
        fill="#7a8490"/>

  <!-- Frost crack lines on rear-left shard -->
  <path d="M24,36 L36,44" stroke="#9aaabb" stroke-width="1.0" fill="none" opacity="0.7"/>
  <path d="M30,44 L26,54" stroke="#9aaabb" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- Crack on front shard -->
  <path d="M42,56 L58,62" stroke="#4a5460" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M50,52 L46,66" stroke="#4a5460" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Frost highlight edge on rear shards -->
  <path d="M26,30 L40,26" stroke="#b0bcc8" stroke-width="1.0" fill="none" opacity="0.55"/>
  <path d="M44,26 L62,22" stroke="#b0bcc8" stroke-width="1.0" fill="none" opacity="0.5"/>
</svg>
