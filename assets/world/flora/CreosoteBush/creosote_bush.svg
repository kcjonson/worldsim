<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Creosote Bush - Top-down view (~0.7m diameter)
       Airy, open shrub: wiry branch arms radiating from center, tipped with small
       dark olive-green leaf clusters. Open tan gaps between branches. -->

  <!-- Faint ground shadow (open bush, light shadow) -->
  <ellipse cx="52" cy="56" rx="34" ry="22" fill="#8a7040" opacity="0.18"/>

  <!-- Bare woody branch arms - mid-brown, radiating from center -->
  <!-- NW arm -->
  <path d="M50,50 Q36,38 28,26" stroke="#7a5a2a" stroke-width="2.0" fill="none"/>
  <!-- N arm -->
  <path d="M50,50 Q48,34 46,18" stroke="#7a5a2a" stroke-width="1.8" fill="none"/>
  <!-- NE arm -->
  <path d="M50,50 Q64,36 74,24" stroke="#7a5a2a" stroke-width="2.0" fill="none"/>
  <!-- E arm -->
  <path d="M50,50 Q68,48 82,46" stroke="#7a5a2a" stroke-width="1.8" fill="none"/>
  <!-- SE arm -->
  <path d="M50,50 Q66,62 76,74" stroke="#7a5a2a" stroke-width="2.0" fill="none"/>
  <!-- S arm -->
  <path d="M50,50 Q52,66 54,80" stroke="#7a5a2a" stroke-width="1.8" fill="none"/>
  <!-- SW arm -->
  <path d="M50,50 Q34,62 22,72" stroke="#7a5a2a" stroke-width="2.0" fill="none"/>
  <!-- W arm -->
  <path d="M50,50 Q30,50 16,50" stroke="#7a5a2a" stroke-width="1.8" fill="none"/>

  <!-- Leaf clusters at branch tips — dark olive-green, small irregular blobs -->
  <!-- NW cluster -->
  <ellipse cx="27" cy="25" rx="9" ry="8" fill="#3d5422"/>
  <ellipse cx="22" cy="30" rx="6" ry="5" fill="#4a6228"/>
  <!-- N cluster -->
  <ellipse cx="46" cy="17" rx="8" ry="7" fill="#3d5422"/>
  <ellipse cx="52" cy="14" rx="5" ry="5" fill="#4a6228"/>
  <!-- NE cluster -->
  <ellipse cx="74" cy="22" rx="9" ry="8" fill="#3d5422"/>
  <ellipse cx="79" cy="28" rx="5" ry="5" fill="#4a6228"/>
  <!-- E cluster -->
  <ellipse cx="82" cy="46" rx="8" ry="7" fill="#3d5422"/>
  <ellipse cx="84" cy="40" rx="5" ry="5" fill="#4a6228"/>
  <!-- SE cluster -->
  <ellipse cx="76" cy="74" rx="9" ry="8" fill="#3d5422"/>
  <ellipse cx="70" cy="78" rx="6" ry="5" fill="#4a6228"/>
  <!-- S cluster -->
  <ellipse cx="54" cy="80" rx="7" ry="8" fill="#3d5422"/>
  <ellipse cx="48" cy="83" rx="5" ry="5" fill="#4a6228"/>
  <!-- SW cluster -->
  <ellipse cx="21" cy="72" rx="9" ry="8" fill="#3d5422"/>
  <ellipse cx="16" cy="66" rx="6" ry="5" fill="#4a6228"/>
  <!-- W cluster -->
  <ellipse cx="16" cy="50" rx="8" ry="7" fill="#3d5422"/>
  <ellipse cx="18" cy="56" rx="5" ry="5" fill="#4a6228"/>

  <!-- Tiny highlight flicks on leaf clusters (slightly lighter olive) -->
  <ellipse cx="28" cy="23" rx="3" ry="2" fill="#5a7830" opacity="0.7"/>
  <ellipse cx="75" cy="20" rx="3" ry="2" fill="#5a7830" opacity="0.7"/>
  <ellipse cx="55" cy="78" rx="3" ry="2" fill="#5a7830" opacity="0.7"/>
  <ellipse cx="17" cy="48" rx="3" ry="2" fill="#5a7830" opacity="0.7"/>

  <!-- Small woody center knot -->
  <ellipse cx="50" cy="50" rx="5" ry="5" fill="#6b4e28"/>
</svg>
