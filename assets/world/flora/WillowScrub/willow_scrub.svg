<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Willow Scrub - Top-down view, clump of drooping withies radiating from base -->

  <!-- Shadow -->
  <ellipse cx="52" cy="60" rx="38" ry="20" fill="#2a3a1a" opacity="0.28"/>

  <!-- Central base mass (dense shoots) -->
  <ellipse cx="50" cy="52" rx="14" ry="12" fill="#6b7a30"/>

  <!-- Drooping branch sprays - narrow elongated leaf shapes radiating outward -->
  <!-- Each spray: a thin arc stroke for the stem + narrow filled leaf cluster -->

  <!-- Spray north -->
  <path d="M50,42 C48,30 44,22 42,16" stroke="#8a9040" stroke-width="1.5" fill="none"/>
  <path d="M42,16 C40,18 38,24 40,28 C44,26 46,20 42,16 Z" fill="#9aaa48"/>
  <path d="M50,42 C52,30 54,22 56,16" stroke="#8a9040" stroke-width="1.2" fill="none"/>
  <path d="M56,16 C58,18 58,24 55,28 C52,26 52,20 56,16 Z" fill="#9aaa48"/>

  <!-- Spray northeast -->
  <path d="M56,44 C64,34 70,26 76,20" stroke="#7e9238" stroke-width="1.5" fill="none"/>
  <path d="M76,20 C78,23 76,30 72,32 C70,28 72,22 76,20 Z" fill="#92a842"/>

  <!-- Spray east -->
  <path d="M60,50 C70,46 78,42 86,38" stroke="#8a9040" stroke-width="1.5" fill="none"/>
  <path d="M86,38 C87,41 84,46 80,47 C78,43 80,38 86,38 Z" fill="#9aaa48"/>
  <path d="M60,54 C70,54 78,56 86,56" stroke="#7e9238" stroke-width="1.2" fill="none"/>
  <path d="M86,56 C86,59 82,62 78,61 C77,57 80,54 86,56 Z" fill="#92a842"/>

  <!-- Spray southeast -->
  <path d="M56,60 C62,68 66,76 68,84" stroke="#7a8c36" stroke-width="1.5" fill="none"/>
  <path d="M68,84 C65,85 60,82 60,78 C63,76 67,78 68,84 Z" fill="#8ea040"/>

  <!-- Spray south -->
  <path d="M50,62 C50,72 48,80 46,88" stroke="#8a9040" stroke-width="1.5" fill="none"/>
  <path d="M46,88 C43,87 41,82 44,78 C47,78 47,84 46,88 Z" fill="#9aaa48"/>

  <!-- Spray southwest -->
  <path d="M44,60 C36,68 28,74 20,80" stroke="#7e9238" stroke-width="1.5" fill="none"/>
  <path d="M20,80 C18,77 20,71 24,70 C26,74 24,78 20,80 Z" fill="#92a842"/>

  <!-- Spray west -->
  <path d="M40,52 C30,48 22,44 14,42" stroke="#8a9040" stroke-width="1.5" fill="none"/>
  <path d="M14,42 C13,45 16,50 20,50 C22,46 20,42 14,42 Z" fill="#9aaa48"/>

  <!-- Spray northwest -->
  <path d="M44,44 C36,36 30,28 24,20" stroke="#7e9238" stroke-width="1.5" fill="none"/>
  <path d="M24,20 C22,23 24,30 28,32 C30,28 28,22 24,20 Z" fill="#92a842"/>

  <!-- Inner foliage fill to hide bare centre -->
  <ellipse cx="50" cy="50" rx="10" ry="9" fill="#7a9238"/>
  <ellipse cx="50" cy="50" rx="5" ry="4" fill="#8aa040"/>
</svg>
