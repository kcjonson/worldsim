<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Sagebrush - Top-down view (~0.5m diameter)
       Dense rounded mound of fine silvery grey-green foliage. No open gaps —
       a compact dome that reads as a cohesive grey-green mass on tan ground. -->

  <!-- Ground shadow (low, dense bush) -->
  <ellipse cx="52" cy="60" rx="36" ry="20" fill="#8a7040" opacity="0.20"/>

  <!-- Outer mound body — mid grey-green base -->
  <path d="M50,16
           C66,14 80,26 84,42
           C88,58 80,74 64,82
           C50,88 34,86 22,76
           C12,66 12,50 18,36
           C24,22 36,18 50,16 Z"
        fill="#7a8e6a"/>

  <!-- Slightly lighter interior — sun catching the top of the dome -->
  <path d="M50,24
           C63,22 74,32 77,46
           C80,60 72,72 58,77
           C46,81 34,77 28,66
           C22,56 24,42 32,34
           C38,26 44,24 50,24 Z"
        fill="#8a9e78"/>

  <!-- Fine foliage texture — small irregular lobes of slightly different tones -->
  <ellipse cx="38" cy="26" rx="11" ry="9" fill="#7e9470"/>
  <ellipse cx="60" cy="22" rx="12" ry="9" fill="#869c72"/>
  <ellipse cx="76" cy="38" rx="10" ry="11" fill="#7e9470"/>
  <ellipse cx="80" cy="58" rx="9" ry="11" fill="#869c72"/>
  <ellipse cx="66" cy="76" rx="12" ry="9" fill="#7e9470"/>
  <ellipse cx="44" cy="80" rx="11" ry="8" fill="#869c72"/>
  <ellipse cx="24" cy="68" rx="10" ry="10" fill="#7e9470"/>
  <ellipse cx="20" cy="44" rx="9" ry="11" fill="#869c72"/>

  <!-- Central highlight — lightest tone, the very top of the dome -->
  <ellipse cx="50" cy="48" rx="16" ry="13" fill="#96aa82" opacity="0.85"/>

  <!-- Silvery sheen highlights (the grey-silver of sage leaves) -->
  <ellipse cx="44" cy="36" rx="7" ry="5" fill="#aab898" opacity="0.55"/>
  <ellipse cx="60" cy="34" rx="6" ry="5" fill="#aab898" opacity="0.55"/>
  <ellipse cx="66" cy="52" rx="6" ry="5" fill="#aab898" opacity="0.5"/>
  <ellipse cx="50" cy="58" rx="7" ry="5" fill="#aab898" opacity="0.5"/>
  <ellipse cx="36" cy="54" rx="6" ry="5" fill="#aab898" opacity="0.5"/>

  <!-- Tiny woody stem glimpses at base edge (dark, barely visible) -->
  <ellipse cx="50" cy="50" rx="4" ry="4" fill="#5a4e2a" opacity="0.4"/>
</svg>
