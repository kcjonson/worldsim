<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Cloudberry - Top-down view (~0.2m low plant, lobed leaves + amber berry) -->

  <!-- Shadow -->
  <ellipse cx="52" cy="66" rx="28" ry="14" fill="#3a4020" opacity="0.20"/>

  <!-- Main leaf (left). Lobes drawn as overlapping circles on a base ellipse
       so nothing self-crosses; rounded palmate cloudberry leaf. -->
  <ellipse cx="44" cy="48" rx="20" ry="16" fill="#3a5828"/>
  <circle cx="38" cy="32" r="9" fill="#3a5828"/>
  <circle cx="52" cy="30" r="9" fill="#3a5828"/>
  <circle cx="64" cy="40" r="8" fill="#3a5828"/>
  <circle cx="30" cy="60" r="8" fill="#3a5828"/>
  <circle cx="56" cy="62" r="8" fill="#3a5828"/>

  <!-- Leaf vein highlight (thin stroke, the main midrib) -->
  <path d="M38,72 C40,58 44,46 50,36" stroke="#4e7034" stroke-width="1.0" fill="none" opacity="0.6"/>

  <!-- Second smaller leaf behind/right (overlapping circles, lobed) -->
  <ellipse cx="66" cy="52" rx="13" ry="11" fill="#325020"/>
  <circle cx="64" cy="38" r="7" fill="#325020"/>
  <circle cx="77" cy="46" r="6" fill="#325020"/>
  <circle cx="58" cy="64" r="6" fill="#325020"/>

  <!-- Stem from center -->
  <path d="M50,80 L50,60" stroke="#4a6030" stroke-width="1.5" fill="none"/>
  <path d="M50,70 L38,62" stroke="#4a6030" stroke-width="1.2" fill="none"/>
  <path d="M50,65 L64,58" stroke="#4a6030" stroke-width="1.2" fill="none"/>

  <!-- The cloudberry - single amber/golden-orange drupe, prominent -->
  <circle cx="50" cy="44" r="11" fill="#c87820"/>
  <!-- Drupe segments (cloudberry has distinct lobes) -->
  <path d="M50,34 C44,36 40,40 40,44 C40,48 44,52 50,54 C50,48 48,44 50,38 Z"
        fill="#e08828" opacity="0.8"/>
  <path d="M50,34 C56,36 60,40 60,44 C60,48 56,52 50,54 C50,48 52,44 50,38 Z"
        fill="#b86c18" opacity="0.7"/>
  <!-- Berry highlight -->
  <ellipse cx="46" cy="39" rx="4" ry="3" fill="#f0a040" opacity="0.6"/>
  <!-- Berry nub (calyx top) -->
  <circle cx="50" cy="34" r="2" fill="#8a5010"/>
</svg>
