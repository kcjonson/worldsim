<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Tropical Shrub - Top-down view (~0.9m broad-leaved understory shrub) -->
  <!-- Several large glossy dark-green leaves radiating from a central stem -->

  <!-- Shadow beneath -->
  <ellipse cx="52" cy="62" rx="36" ry="22" fill="#2a3a1a" opacity="0.28"/>

  <!-- Central stem base -->
  <ellipse cx="50" cy="52" rx="6" ry="5" fill="#3a2a14"/>

  <!-- Each leaf is a simple 4-point blade: a wide base near the stem, two
       side points, narrowing to a tip. Straight edges, no self-crossing. -->

  <!-- Leaf 1 - large, pointing upper-left -->
  <path d="M52,52 L36,40 L24,28 L26,40 L48,52 Z" fill="#2d5a28"/>
  <!-- Leaf 1 midrib -->
  <path d="M50,50 C42,40 30,32 24,28" stroke="#244820" stroke-width="1.0" fill="none" opacity="0.7"/>

  <!-- Leaf 2 - large, pointing upper-right -->
  <path d="M48,52 L64,40 L76,26 L74,38 L52,52 Z" fill="#2e5c28"/>
  <path d="M50,50 C60,40 70,30 76,26" stroke="#244820" stroke-width="1.0" fill="none" opacity="0.7"/>

  <!-- Leaf 3 - broad, pointing right -->
  <path d="M50,46 L68,46 L82,44 L74,54 L50,54 Z" fill="#2a5424"/>
  <path d="M50,50 C62,49 74,47 82,44" stroke="#224018" stroke-width="1.0" fill="none" opacity="0.7"/>

  <!-- Leaf 4 - broad, pointing lower-right -->
  <path d="M48,52 L62,64 L72,76 L60,70 L50,54 Z" fill="#2d5a26"/>
  <path d="M50,52 C58,60 66,68 72,76" stroke="#244820" stroke-width="1.0" fill="none" opacity="0.7"/>

  <!-- Leaf 5 - pointing lower-left -->
  <path d="M52,52 L38,64 L26,74 L30,62 L50,54 Z" fill="#2a5224"/>
  <path d="M50,52 C40,60 32,68 26,74" stroke="#224018" stroke-width="1.0" fill="none" opacity="0.7"/>

  <!-- Leaf 6 - pointing left -->
  <path d="M50,46 L34,48 L18,54 L26,46 L50,54 Z" fill="#2e5c28"/>
  <path d="M50,50 C38,50 26,52 18,54" stroke="#244820" stroke-width="1.0" fill="none" opacity="0.7"/>

  <!-- Glossy highlight patches on leaves (top lighting) -->
  <ellipse cx="36" cy="36" rx="5" ry="3" fill="#4a8a3e" opacity="0.6"/>
  <ellipse cx="66" cy="36" rx="4" ry="3" fill="#4a8a3e" opacity="0.55"/>
  <ellipse cx="68" cy="48" rx="4" ry="2" fill="#4a8a3e" opacity="0.5"/>
  <ellipse cx="60" cy="68" rx="3" ry="4" fill="#4a8a3e" opacity="0.5"/>
  <ellipse cx="32" cy="64" rx="3" ry="4" fill="#4a8a3e" opacity="0.5"/>
</svg>
