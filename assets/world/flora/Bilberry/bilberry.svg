<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bilberry - Top-down view (~0.3m low mat of leaves and berries) -->

  <!-- Ground shadow - low plant, very soft -->
  <ellipse cx="52" cy="60" rx="34" ry="22" fill="#3a4830" opacity="0.2"/>

  <!-- Leaf mat base - broad irregular spreading shape, medium green -->
  <path d="M30,36
           C38,26 56,24 68,32
           C80,40 84,54 78,66
           C72,78 58,84 44,80
           C30,76 20,64 20,52
           C20,44 24,44 30,36 Z"
        fill="#4a7038"/>

  <!-- Leaf lobe clusters - slightly lighter green, overlapping rounded lobes -->
  <ellipse cx="38" cy="34" rx="12" ry="9" fill="#5a8044"/>
  <ellipse cx="56" cy="28" rx="11" ry="8" fill="#527a3e"/>
  <ellipse cx="72" cy="40" rx="10" ry="11" fill="#5a8044"/>
  <ellipse cx="76" cy="58" rx="9" ry="11" fill="#527a3e"/>
  <ellipse cx="62" cy="76" rx="11" ry="8" fill="#5a8044"/>
  <ellipse cx="42" cy="78" rx="10" ry="8" fill="#527a3e"/>
  <ellipse cx="24" cy="60" rx="9" ry="11" fill="#5a8044"/>
  <ellipse cx="26" cy="42" rx="9" ry="10" fill="#527a3e"/>

  <!-- Central leaf mass -->
  <ellipse cx="50" cy="54" rx="18" ry="16" fill="#5a8044"/>

  <!-- Leaf vein hints - two thin strokes -->
  <path d="M34,38 Q42,46 38,58" stroke="#3a5e2c" stroke-width="1.0" fill="none" opacity="0.45"/>
  <path d="M62,34 Q66,48 60,60" stroke="#3a5e2c" stroke-width="1.0" fill="none" opacity="0.45"/>

  <!-- Berry dots - dark blue-purple, scattered across the mat -->
  <circle cx="42" cy="40" r="3.5" fill="#2a2060"/>
  <circle cx="60" cy="36" r="3.0" fill="#2a2060"/>
  <circle cx="70" cy="50" r="3.2" fill="#332878"/>
  <circle cx="66" cy="66" r="3.5" fill="#2a2060"/>
  <circle cx="48" cy="70" r="3.0" fill="#332878"/>
  <circle cx="34" cy="62" r="3.2" fill="#2a2060"/>
  <circle cx="50" cy="46" r="3.5" fill="#332878"/>
  <circle cx="56" cy="56" r="2.8" fill="#2a2060"/>

  <!-- Tiny highlight dot on each berry (top lighting, single pixel) -->
  <circle cx="41" cy="39" r="1.1" fill="#6060a0" opacity="0.7"/>
  <circle cx="59" cy="35" r="1.0" fill="#6060a0" opacity="0.7"/>
  <circle cx="69" cy="49" r="1.0" fill="#6060a0" opacity="0.7"/>
  <circle cx="65" cy="65" r="1.1" fill="#6060a0" opacity="0.7"/>
  <circle cx="47" cy="69" r="1.0" fill="#6060a0" opacity="0.7"/>
  <circle cx="33" cy="61" r="1.0" fill="#6060a0" opacity="0.7"/>
  <circle cx="49" cy="45" r="1.1" fill="#6060a0" opacity="0.7"/>
</svg>
