<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- CottonGrass - Top-down view (~0.4m tuft of sedge with fluffy white seed heads) -->

  <!-- Shadow -->
  <ellipse cx="52" cy="70" rx="30" ry="14" fill="#304028" opacity="0.22"/>

  <!-- Grass blade tuft base (dark green, radiating from center) -->
  <!-- Left blades -->
  <path d="M48,72 C42,60 36,48 28,34" stroke="#3a5828" stroke-width="2.5" fill="none"/>
  <path d="M48,72 C40,58 34,44 26,28" stroke="#445e30" stroke-width="2.0" fill="none"/>
  <path d="M50,72 C46,60 44,48 40,30" stroke="#3a5828" stroke-width="2.0" fill="none"/>

  <!-- Center blades -->
  <path d="M50,74 C50,62 50,50 50,32" stroke="#4a6838" stroke-width="2.5" fill="none"/>
  <path d="M50,74 C52,60 54,48 56,30" stroke="#3a5828" stroke-width="2.0" fill="none"/>

  <!-- Right blades -->
  <path d="M52,72 C58,58 64,46 70,32" stroke="#445e30" stroke-width="2.0" fill="none"/>
  <path d="M52,72 C60,60 66,48 74,34" stroke="#3a5828" stroke-width="2.5" fill="none"/>
  <path d="M52,72 C62,62 70,52 78,40" stroke="#445e30" stroke-width="2.0" fill="none"/>

  <!-- Drooping side blades -->
  <path d="M48,72 C36,68 24,66 16,62" stroke="#3a5828" stroke-width="1.5" fill="none"/>
  <path d="M52,72 C64,70 76,68 84,64" stroke="#3a5828" stroke-width="1.5" fill="none"/>

  <!-- Forward blades draping toward the viewer (fill the lower tile) -->
  <path d="M49,73 C44,80 38,85 30,88" stroke="#3a5828" stroke-width="2.0" fill="none"/>
  <path d="M50,74 C50,82 50,88 50,92" stroke="#445e30" stroke-width="2.0" fill="none"/>
  <path d="M51,73 C56,80 62,85 70,88" stroke="#3a5828" stroke-width="2.0" fill="none"/>

  <!-- Cotton seed heads - fluffy white tufts on stem tips -->
  <!-- Left stem tuft -->
  <ellipse cx="27" cy="31" rx="7" ry="9" fill="#e8e8e0"/>
  <ellipse cx="24" cy="29" rx="4" ry="6" fill="#f4f4ee" opacity="0.8"/>
  <ellipse cx="30" cy="28" rx="4" ry="5" fill="#f4f4ee" opacity="0.7"/>

  <!-- Left-center tuft -->
  <ellipse cx="40" cy="27" rx="6" ry="8" fill="#e8e8e0"/>
  <ellipse cx="38" cy="25" rx="4" ry="5" fill="#f4f4ee" opacity="0.8"/>
  <ellipse cx="43" cy="24" rx="3" ry="5" fill="#f4f4ee" opacity="0.7"/>

  <!-- Center tuft -->
  <ellipse cx="50" cy="28" rx="7" ry="9" fill="#e8e8e0"/>
  <ellipse cx="47" cy="26" rx="4" ry="6" fill="#f4f4ee" opacity="0.8"/>
  <ellipse cx="53" cy="25" rx="4" ry="6" fill="#f4f4ee" opacity="0.7"/>

  <!-- Right-center tuft -->
  <ellipse cx="61" cy="27" rx="6" ry="8" fill="#e8e8e0"/>
  <ellipse cx="59" cy="25" rx="4" ry="5" fill="#f4f4ee" opacity="0.8"/>
  <ellipse cx="64" cy="24" rx="3" ry="5" fill="#f4f4ee" opacity="0.7"/>

  <!-- Right tuft -->
  <ellipse cx="73" cy="31" rx="6" ry="8" fill="#e8e8e0"/>
  <ellipse cx="71" cy="29" rx="4" ry="5" fill="#f4f4ee" opacity="0.8"/>
  <ellipse cx="76" cy="28" rx="3" ry="5" fill="#f4f4ee" opacity="0.7"/>
</svg>
