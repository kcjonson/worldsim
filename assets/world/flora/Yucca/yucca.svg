<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Yucca - Top-down view (~0.9m rosette diameter)
       Stiff sword-like leaves radiating as a spiky burst from a tight central crown.
       Grey-green blades, darker at base, lighter toward tips. Small cream flower-stalk
       dot at center. -->

  <!-- Ground shadow (wide, low-ish plant) -->
  <ellipse cx="52" cy="56" rx="38" ry="22" fill="#8a7040" opacity="0.20"/>

  <!-- Sword leaves — 12 blades radiating from center, tapered to points.
       Each is a narrow elongated shape: wide at base (~4-5px), tapering to a sharp tip. -->

  <!-- Each blade is a simple 4-point quad: two base points near the crown,
       widening slightly, then narrowing to a sharp tip. No self-crossing. -->

  <!-- N blade -->
  <path d="M47,52 L46,18 L50,14 L54,18 L53,52 Z" fill="#72887a"/>
  <!-- NNE blade -->
  <path d="M51,49 L66,22 L73,19 L72,26 L54,51 Z" fill="#7a9080"/>
  <!-- NE blade -->
  <path d="M52,48 L78,30 L85,31 L82,37 L55,52 Z" fill="#72887a"/>
  <!-- ENE blade -->
  <path d="M52,52 L82,49 L89,52 L82,55 L52,54 Z" fill="#7a9080"/>
  <!-- SE blade -->
  <path d="M53,52 L76,72 L80,78 L73,77 L51,55 Z" fill="#72887a"/>
  <!-- SSE blade -->
  <path d="M51,53 L53,82 L52,89 L48,84 L48,53 Z" fill="#7a9080"/>
  <!-- S blade -->
  <path d="M49,53 L30,74 L24,79 L25,72 L47,52 Z" fill="#72887a"/>
  <!-- SW blade -->
  <path d="M48,52 L18,55 L11,52 L18,49 L48,48 Z" fill="#7a9080"/>
  <!-- W blade -->
  <path d="M48,48 L22,30 L16,24 L23,25 L51,48 Z" fill="#72887a"/>
  <!-- NNW blade -->
  <path d="M49,49 L30,24 L26,18 L33,20 L52,50 Z" fill="#7a9080"/>

  <!-- Lighter midrib lines along each blade (structural leaf detail) -->
  <path d="M50,50 L49,14" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M50,50 L72,20" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M50,50 L84,33" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M50,50 L86,54" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M50,50 L79,75" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M50,50 L54,85" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M50,50 L27,77" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M50,50 L14,53" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M50,50 L19,25" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M50,50 L29,21" stroke="#9aaa98" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Central crown (tight, dark base where all blades meet) -->
  <ellipse cx="50" cy="50" rx="6" ry="6" fill="#4a5e52"/>
  <!-- Cream flower-stalk bud at center -->
  <ellipse cx="50" cy="50" rx="3" ry="3" fill="#d4c89a"/>
  <ellipse cx="50" cy="50" rx="1.5" ry="1.5" fill="#e8dab0"/>
</svg>
