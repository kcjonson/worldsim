<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Acacia Scrub - Top-down view (~1.0m flat-topped umbrella acacia) -->
  <!-- Broad, slightly irregular flat canopy of feathery olive-green foliage -->
  <!-- with dark branch lines radiating from center — the iconic savanna crown -->

  <!-- Cast shadow (slightly offset, flat canopy casts a wide shadow) -->
  <ellipse cx="54" cy="60" rx="38" ry="24" fill="#3a3010" opacity="0.25"/>

  <!-- Outer canopy edge - broad irregular ring, feathery olive-green -->
  <!-- The umbrella shape is slightly lopsided for naturalism -->
  <path d="M50,14
           C60,12 72,16 80,24
           C88,32 90,46 86,58
           C82,70 72,78 60,82
           C48,86 34,84 24,76
           C14,68 10,54 14,42
           C18,28 34,16 50,14 Z"
        fill="#7a8040"/>

  <!-- Inner canopy body (slightly lighter/yellower centre, more sunlit) -->
  <path d="M50,22
           C60,20 70,24 76,34
           C82,44 80,56 72,64
           C64,72 52,74 42,70
           C30,66 22,56 24,44
           C26,32 38,24 50,22 Z"
        fill="#8a8e46"/>

  <!-- Foliage texture patches (irregular blobs, feathery feel) -->
  <ellipse cx="50" cy="26" rx="12" ry="7" fill="#7e8440" opacity="0.8"/>
  <ellipse cx="70" cy="34" rx="10" ry="8" fill="#8a8e44" opacity="0.75"/>
  <ellipse cx="78" cy="52" rx="8" ry="10" fill="#7e8440" opacity="0.8"/>
  <ellipse cx="66" cy="70" rx="11" ry="7" fill="#8a8e44" opacity="0.75"/>
  <ellipse cx="44" cy="74" rx="11" ry="7" fill="#7e8440" opacity="0.75"/>
  <ellipse cx="24" cy="60" rx="8" ry="10" fill="#8a8e44" opacity="0.8"/>
  <ellipse cx="26" cy="38" rx="9" ry="8" fill="#7e8440" opacity="0.8"/>

  <!-- Central hub (where branches meet the trunk, slightly darker) -->
  <ellipse cx="50" cy="50" rx="7" ry="6" fill="#5a5e2a"/>

  <!-- Radiating branch lines (the defining acacia feature — dark veins) -->
  <path d="M50,50 L50,22" stroke="#4a4a20" stroke-width="1.4" fill="none" opacity="0.75"/>
  <path d="M50,50 L74,32" stroke="#4a4a20" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M50,50 L80,52" stroke="#4a4a20" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M50,50 L68,72" stroke="#4a4a20" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M50,50 L42,76" stroke="#4a4a20" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M50,50 L20,60" stroke="#4a4a20" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M50,50 L22,36" stroke="#4a4a20" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- Canopy edge highlights (lighter tips of feathery foliage) -->
  <ellipse cx="50" cy="16" rx="8" ry="4" fill="#9a9e50" opacity="0.5"/>
  <ellipse cx="80" cy="42" rx="5" ry="7" fill="#9a9e50" opacity="0.45"/>
  <ellipse cx="18" cy="50" rx="5" ry="7" fill="#9a9e50" opacity="0.45"/>
</svg>
