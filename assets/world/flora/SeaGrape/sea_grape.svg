<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Sea Grape - Top-down view, broad round leathery leaves + purple berry clusters -->

  <!-- Shadow -->
  <ellipse cx="52" cy="64" rx="36" ry="19" fill="#1a2a10" opacity="0.28"/>

  <!-- Shrub base fill -->
  <path d="M50,20
           C66,18 80,28 84,46
           C88,64 76,82 56,86
           C36,90 18,76 14,56
           C10,38 26,20 50,20 Z"
        fill="#3a5a2a"/>

  <!-- Broad round leaves - leathery mid-green, overlapping circles/ellipses -->
  <!-- Sea grape leaves are notably large and round -->
  <circle cx="50" cy="32" r="14" fill="#3e6a2c"/>
  <circle cx="68" cy="40" r="13" fill="#447830"/>
  <circle cx="72" cy="60" r="13" fill="#3e6a2c"/>
  <circle cx="56" cy="74" r="12" fill="#447830"/>
  <circle cx="36" cy="72" r="13" fill="#3e6a2c"/>
  <circle cx="22" cy="56" r="12" fill="#447830"/>
  <circle cx="26" cy="36" r="13" fill="#3e6a2c"/>
  <circle cx="46" cy="52" r="14" fill="#4a7c34"/>

  <!-- Leaf midrib lines (the distinctive heavy central vein) -->
  <path d="M50,20 Q50,32 50,44" stroke="#2e5020" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M56,28 Q64,36 70,48" stroke="#2e5020" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M68,52 Q68,62 66,72" stroke="#2e5020" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M52,68 Q48,74 42,80" stroke="#2e5020" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M30,62 Q26,54 22,44" stroke="#2e5020" stroke-width="1.0" fill="none" opacity="0.5"/>
  <path d="M28,38 Q36,30 46,26" stroke="#2e5020" stroke-width="1.0" fill="none" opacity="0.5"/>

  <!-- Leaf highlights (waxy leathery sheen) -->
  <circle cx="48" cy="30" r="6" fill="#5a8c40" opacity="0.6"/>
  <circle cx="66" cy="38" r="5" fill="#5a8c40" opacity="0.55"/>
  <circle cx="70" cy="58" r="5" fill="#5a8c40" opacity="0.55"/>
  <circle cx="44" cy="50" r="6" fill="#5a9040" opacity="0.6"/>

  <!-- Purple berry clusters - hanging tight grape-like groups -->
  <!-- Cluster 1, right side -->
  <circle cx="78" cy="46" r="3.5" fill="#6a3880"/>
  <circle cx="74" cy="50" r="3.2" fill="#7a4290"/>
  <circle cx="78" cy="54" r="3.5" fill="#6a3880"/>
  <circle cx="82" cy="50" r="3.0" fill="#7a4290"/>
  <circle cx="76" cy="44" r="2.8" fill="#542c6a"/>

  <!-- Cluster 2, lower -->
  <circle cx="60" cy="82" r="3.2" fill="#6a3880"/>
  <circle cx="64" cy="86" r="3.5" fill="#7a4290"/>
  <circle cx="68" cy="82" r="3.0" fill="#6a3880"/>
  <circle cx="62" cy="78" r="2.8" fill="#542c6a"/>
  <circle cx="66" cy="78" r="2.8" fill="#7a4290"/>

  <!-- Cluster 3, left -->
  <circle cx="18" cy="52" r="3.2" fill="#6a3880"/>
  <circle cx="14" cy="56" r="3.5" fill="#7a4290"/>
  <circle cx="18" cy="60" r="3.0" fill="#6a3880"/>
  <circle cx="22" cy="56" r="2.8" fill="#542c6a"/>

  <!-- Berry highlights (small light spot on each) -->
  <circle cx="77" cy="44" r="1.2" fill="#9a68b0" opacity="0.7"/>
  <circle cx="63" cy="84" r="1.2" fill="#9a68b0" opacity="0.7"/>
  <circle cx="17" cy="54" r="1.2" fill="#9a68b0" opacity="0.7"/>
</svg>
